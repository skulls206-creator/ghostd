<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>GHOSTD</title>
  <script>
    // SPA redirect for GitHub Pages (spa-github-pages technique).
    // Encodes the requested path so the SPA can restore it on load.
    (function () {
      var segmentCount = 0; // for custom domain, no repo segment in path
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    })();
  </script>
</head>
<body></body>
</html>

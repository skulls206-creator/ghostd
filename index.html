<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>GHOSTD</title>

    <!-- Favicon cascade: SVG → PNG → fallback -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
    <link rel="shortcut icon" href="/logo.png" />

    <!-- Apple / iOS -->
    <link rel="apple-touch-icon" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icon-512.png" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0A0E17" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="GHOSTD" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="GHOSTD" />

    <!-- Windows tiles -->
    <meta name="msapplication-TileColor" content="#0A0E17" />
    <meta name="msapplication-TileImage" content="/icon-192.png" />
    <meta name="msapplication-square70x70logo" content="/icon-192.png" />
    <meta name="msapplication-square150x150logo" content="/icon-192.png" />
    <meta name="msapplication-square310x310logo" content="/icon-512.png" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="GHOSTD — Trade. Precisely." />
    <meta property="og:description" content="A precision-built interface for Crypton markets and digital assets on the Utopia ecosystem." />
    <meta property="og:image" content="/opengraph.jpg" />
    <meta property="og:image:width" content="1280" />
    <meta property="og:image:height" content="720" />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="GHOSTD — Trade. Precisely." />
    <meta name="twitter:description" content="A precision-built interface for Crypton markets and digital assets on the Utopia ecosystem." />
    <meta name="twitter:image" content="/opengraph.jpg" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- SPA GitHub Pages: restore path from 404.html redirect -->
    <script>
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function (s) {
            return s.replace(/~and~/g, '&');
          }).join('?');
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })(window.location);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
